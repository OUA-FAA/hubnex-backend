spring.application.name=hubnex-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/hubnex_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

jwt.secret=${JWT_SECRET:change-this-secret-key-must-be-at-least-64-characters-long-for-hs512}
jwt.expiration-ms=86400000

admin.initial.login=${ADMIN_LOGIN:admin}
admin.initial.password=${ADMIN_PASSWORD:admin123}
admin.initial.email=${ADMIN_EMAIL:admin@hubnex.local}
admin.initial.nom-complet=${ADMIN_NOM_COMPLET:Administrateur HuBnex}

conveyor.api.send-url=
conveyor.api.response-url=

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL:http://localhost:4200}
password.reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
